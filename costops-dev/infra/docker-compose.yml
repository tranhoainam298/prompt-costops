version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: costops-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-costops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-costops_secret}
      POSTGRES_DB: ${POSTGRES_DB:-costops_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-costops} -d ${POSTGRES_DB:-costops_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: costops-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    container_name: costops-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-costops}:${POSTGRES_PASSWORD:-costops_secret}@postgres:5432/${POSTGRES_DB:-costops_db}
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret_key}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: costops-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-costops}:${POSTGRES_PASSWORD:-costops_secret}@postgres:5432/${POSTGRES_DB:-costops_db}
      REDIS_URL: redis://redis:6379/1
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret_key}
      GATEWAY_URL: http://gateway:8000
      NODE_ENV: ${ENVIRONMENT:-development}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: costops-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
